name: Tests

on:
  push:
    branches:
    - master
  pull_request:
    branches:
    - master

jobs:
  build-and-test:
    strategy:
      matrix:
        # Oldest supported version is 1.23, plus the latest two releases
        go-version: ['1.23', '1.25', '1.26']
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Check out code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5.0.2
      with:
        go-version: ${{ matrix.go-version }}

    - name: Check formatting
      if: ${{ matrix.go-version == '1.26' && matrix.os == 'ubuntu-latest' }}
      run: diff -u <(echo -n) <(gofmt -d .)

    - name: Check Go modules
      if: ${{ matrix.go-version == '1.26' && matrix.os == 'ubuntu-latest' }}
      run: |
        go mod tidy -diff

    - name: Test
      run: |
        go vet ./...
        go test -v ./...

    - name: Run staticcheck
      if: ${{ matrix.go-version == '1.26' && matrix.os == 'ubuntu-latest' }}
      run: |
        go install honnef.co/go/tools/cmd/staticcheck@latest
        staticcheck -version
        staticcheck ./...
